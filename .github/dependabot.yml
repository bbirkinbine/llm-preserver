# Dependabot keeps dependencies and CI actions patched without a human
# remembering to check. It only opens PRs; CI (.github/workflows/ci.yml,
# including the pip-audit advisory gate) still has to pass before any
# merge, so an update that breaks the build cannot land silently. It pairs
# with the pip-audit gate: pip-audit makes a shipped advisory visible,
# Dependabot opens the PR that fixes it.
#
# Two ecosystems:
#   - uv             — the Python dependency tree (reads uv.lock)
#   - github-actions — the action versions pinned in the workflows
#
# Updates are grouped to cut PR noise: one PR per ecosystem for the
# routine patch/minor bumps, separate PRs only for majors (which deserve
# individual review). Tune open-pull-requests-limit / interval per repo.
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
